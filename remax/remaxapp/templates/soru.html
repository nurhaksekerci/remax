{% extends 'base.html' %} {% block head %}
  {% load static %}
{% endblock %}

<!-- Start Preloader -->
<div class="preloader">
  <div class="book-style">
    <div class="inner">
      <div class="left"></div>
      <div class="middle"></div>
      <div class="right"></div>
    </div>
    <ul>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>

    </ul>
  </div>
</div>
<!-- End Preloader -->

{% block content %}
  <!-- Start Main Banner -->
  <section class="blog my-3">
    <div class="container">
      <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-6 offset-md-3 col-12 wow fadeIn">
          <div class="blog-item" style="width:100%; height:100%;">
            <div class="blog-image" style="width: 100%; height:100%; background-image:url('{{question.presentation.bg_image.url}}'); background-size: 100% 100%; background-size: no-repeat; background-position: center;">
            <div class="row">
              <div class="col-6">
                <h3 class="text-center" style="padding-top: 100px;">{{ question.question_text|upper }}</h3>
              </div>
            </div>
            </div>
            <div class="blog-content">
              <div class="question-options">
                <form method="POST">
                  {% csrf_token %}
                  <label for="answer">Cevabınız:</label><br />
                  <textarea id="answer" name="answer" rows="6" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; resize: vertical;"></textarea>
                  <br /><br />
                  <button type="submit" class="submit-btn" style="background-color: #0D5FF9; color: white; font-size: 16px; padding: 12px 30px; border-radius: 50px; border: none; cursor: pointer; transition: all 0.3s ease-in-out; text-align: center; display: inline-block; font-family: 'Arial', sans-serif; text-transform: uppercase; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);" onmouseover="this.style.backgroundColor='#0D5FF9'; this.style.transform='scale(1.05)'; this.style.boxShadow='0 6px 12px rgba(0, 0, 0, 0.3)'" onmouseout="this.style.backgroundColor='#ff9900'; this.style.transform='scale(1)'; this.style.boxShadow='0 4px 8px rgba(0, 0, 0, 0.2)'" onmousedown="this.style.backgroundColor='#0D5FF9'; this.style.transform='scale(0.98)'; this.style.boxShadow='none'" onmouseup="this.style.backgroundColor='#0D5FF9'; this.style.transform='scale(1.05)'; this.style.boxShadow='0 6px 12px rgba(0, 0, 0, 0.3)'">Kaydet</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
